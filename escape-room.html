<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>세인트 머시 정신병원</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{background:#000;overflow:hidden;overscroll-behavior:none;position:fixed;width:100%;height:100%}
body{display:flex;justify-content:center;align-items:flex-start;padding-top:env(safe-area-inset-top)}
.game-wrap{width:100%;max-width:640px;font-family:'Press Start 2P','Courier New',monospace;padding-bottom:env(safe-area-inset-bottom)}
.title-bar{background:#080610;border:1px solid #1a0820;border-bottom:none;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;border-radius:8px 8px 0 0}
.title-text{color:#6b0000;font-size:clamp(7px,2vw,10px);letter-spacing:1px}
.room-num{color:#3a1a1a;font-size:clamp(7px,1.8vw,9px)}
.resource-bars{display:flex;gap:8px;align-items:center}
.res-bar-wrap{display:flex;align-items:center;gap:4px}
.res-label{color:#555;font-size:clamp(6px,1.5vw,7px);font-family:inherit}
.res-bar-bg{width:60px;height:8px;background:#111;border:1px solid #222;border-radius:2px;overflow:hidden}
.res-bar-fill{height:100%;transition:width 0.3s,background 0.3s}
.res-num{color:#555;font-size:clamp(6px,1.5vw,7px);font-family:inherit;min-width:18px;text-align:right}
.scene-wrapper{position:relative;width:640px;height:360px;overflow:hidden;cursor:crosshair;touch-action:none;background:#000}
canvas#gc{display:block;width:640px;height:360px;image-rendering:pixelated;image-rendering:crisp-edges}
.crt{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:20}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.7) 100%);pointer-events:none;z-index:21}
.flash{position:absolute;inset:0;background:#680000;opacity:0;transition:opacity 0.18s;pointer-events:none;z-index:22}
.room-label{position:absolute;top:8px;left:10px;color:#443838;font-size:clamp(7px,2vw,9px);font-family:inherit;z-index:25;pointer-events:none;text-shadow:1px 1px 2px #000}
.nav-area{position:absolute;bottom:10px;right:10px;display:flex;gap:6px;z-index:30}
.nav-btn{background:rgba(4,0,0,0.88);border:1px solid #250608;color:#4a1818;font-family:inherit;font-size:clamp(9px,2.5vw,10px);padding:8px 12px;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background 0.2s}
.nav-btn:hover{background:rgba(40,0,0,0.95);color:#7a2828}
.nav-btn:active{background:rgba(60,0,0,0.95)}
.nav-btn.locked{opacity:0.35;color:#333}
.hover-tip{position:absolute;background:rgba(0,0,0,0.92);border:1px solid #250000;color:#8a7070;font-family:inherit;font-size:8px;padding:4px 8px;pointer-events:none;z-index:26;display:none;white-space:nowrap}
.code-modal{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#040104;border:1px solid #380000;padding:12px;z-index:40;width:min(200px,75vw);border-radius:4px;max-height:90%;overflow-y:auto}
.code-modal.open{display:block}
.code-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:6px}
.num-btn{background:#0e0e0e;border:1px solid #1e1e1e;color:#777;font-family:inherit;font-size:clamp(12px,3.5vw,14px);padding:clamp(6px,2vw,10px);cursor:pointer;min-height:44px;-webkit-tap-highlight-color:transparent;text-align:center;transition:background 0.15s}
.code-title{color:#6b0000;font-size:clamp(7px,2vw,9px);text-align:center;margin-bottom:8px;font-family:inherit}
.code-display{background:#0a0a0a;border:1px solid #1e0000;color:#8a6060;font-family:inherit;font-size:clamp(12px,3.5vw,16px);text-align:center;padding:6px;margin-bottom:8px;letter-spacing:4px;min-height:30px;display:flex;align-items:center;justify-content:center}
.num-btn:hover{background:#1a1a1a}
.num-btn:active{background:#2a0000}
.num-btn.zero{grid-column:2}
.code-actions{display:flex;gap:3px;margin-top:6px}
.code-actions button{flex:1;min-height:34px;font-family:inherit;font-size:clamp(7px,2vw,9px);padding:4px;cursor:pointer;border:1px solid #1e1e1e;-webkit-tap-highlight-color:transparent}
.btn-del{background:#1a0000;color:#6b3030}
.btn-ok{background:#001a00;color:#306b30}
.btn-cancel{background:#0a0a0a;color:#555}
.code-led{height:3px;margin-bottom:8px;background:#1a0000;transition:background 0.3s}
.code-led.correct{background:#004400}
.code-led.wrong{background:#880000}
.doc-modal{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#0c0a0a;border:1px solid #3a2020;padding:16px;z-index:40;width:min(280px,85vw);border-radius:4px;max-height:80%;overflow-y:auto}
.doc-modal.open{display:block}
.doc-title{color:#bb8855;font-size:clamp(9px,2.5vw,11px);text-align:center;margin-bottom:12px;font-family:inherit;border-bottom:1px solid #2a1a1a;padding-bottom:8px}
.doc-body{color:#a09898;font-size:clamp(9px,2.5vw,11px);line-height:2;font-family:inherit;margin-bottom:12px;white-space:pre-line}
.doc-close{display:block;width:100%;background:#1a0808;border:1px solid #2a1010;color:#6b3030;font-family:inherit;font-size:clamp(8px,2vw,9px);padding:8px;cursor:pointer;text-align:center}
.dial-modal{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#080808;border:1px solid #333;padding:16px;z-index:40;width:min(220px,75vw);border-radius:4px}
.dial-modal.open{display:block}
.dial-title{color:#8a8060;font-size:clamp(7px,2vw,9px);text-align:center;margin-bottom:10px;font-family:inherit}
.dial-display{background:#0a0a0a;border:1px solid #222;color:#aaa;font-family:inherit;font-size:clamp(16px,4vw,22px);text-align:center;padding:10px;margin-bottom:10px;letter-spacing:2px}
.dial-btns{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.dial-btn{background:#111;border:1px solid #333;color:#888;font-family:inherit;font-size:clamp(10px,3vw,14px);padding:10px 18px;cursor:pointer;min-width:44px;min-height:44px}
.dial-btn:hover{background:#222}
.dial-btn:active{background:#333}
.tutorial{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:48;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;cursor:pointer}
.tutorial.open{display:flex}
.tut-text{color:#aaa;font-family:inherit;font-size:clamp(9px,2.5vw,11px);line-height:2.4;margin-bottom:16px}
.tut-step{color:#555;font-family:inherit;font-size:clamp(7px,1.8vw,8px)}
.tut-icon{font-size:clamp(24px,6vw,32px);margin-bottom:12px}
.act-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.95);z-index:45;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.act-overlay.open{display:flex}
.act-title{color:#6b0000;font-family:inherit;font-size:clamp(12px,3.5vw,16px);margin-bottom:16px;animation:blink 1.2s infinite}
.act-desc{color:#555;font-family:inherit;font-size:clamp(8px,2.2vw,10px);line-height:2.2}
.win-screen{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.96);z-index:50;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.win-screen.open{display:flex}
.win-title{color:#288828;font-family:inherit;font-size:clamp(10px,3vw,14px);animation:blink 1.2s infinite;margin-bottom:24px}
.win-text{color:#404040;font-family:inherit;font-size:clamp(8px,2.2vw,10px);line-height:2.2;margin-bottom:20px}
.win-end{color:#303030;font-family:inherit;font-size:clamp(9px,2.5vw,11px);margin-top:16px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.message-box{background:#020102;border:1px solid #180810;border-top:none;padding:10px 14px;min-height:80px;display:flex;align-items:flex-start}
.message-box{position:relative}
.message-text{color:#8a8088;font-size:clamp(9px,2.5vw,11px);line-height:1.9;font-family:inherit;transition:color 0.2s;flex:1}
.msg-nav{display:flex;flex-direction:column;gap:2px;margin-left:6px;flex-shrink:0}
.msg-nav-btn{background:transparent;border:1px solid #1a1a1a;color:#444;font-size:8px;width:20px;height:20px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;font-family:inherit}
.message-text.msg-item{color:#6a9a6a}
.message-text.msg-hint{color:#9a9a6a}
.inventory-bar{background:#010101;border:1px solid #160810;border-top:none;display:flex;align-items:center;padding:8px 10px;gap:8px;flex-wrap:nowrap;border-radius:0 0 8px 8px}
.inv-label{color:#3a2030;font-size:clamp(7px,1.8vw,9px);font-family:inherit;flex-shrink:0}
.inv-slots{display:flex;gap:4px;flex:1;justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch}
.inv-slot{width:clamp(36px,10vw,46px);height:clamp(36px,10vw,46px);border:1px solid #161616;background:#050505;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0;transition:border-color 0.2s}
.inv-slot.selected{border-color:#7b0000;box-shadow:inset 0 0 8px rgba(120,0,0,0.4)}
.inv-slot canvas{image-rendering:pixelated;image-rendering:crisp-edges}
.inv-slot .inv-tip{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.92);border:1px solid #250000;color:#8a7070;font-family:inherit;font-size:7px;padding:3px 6px;white-space:nowrap;display:none;z-index:60;pointer-events:none}
.inv-slot:hover .inv-tip{display:block}
.hint-btn{background:#0a0a0a;border:1px solid #2a1a1a;color:#5a3a3a;font-family:inherit;font-size:clamp(10px,3vw,14px);width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:background 0.2s,color 0.2s;display:flex;align-items:center;justify-content:center}
.hint-btn:hover{background:#1a0a0a;color:#8a5a5a}
.hint-btn:active{background:#2a1010}
.hint-btn.pulse{animation:hintPulse 2s infinite}
@keyframes hintPulse{0%,100%{border-color:#2a1a1a}50%{border-color:#5a3a3a}}
.inv-sel-name{color:#7b4040;font-size:clamp(6px,1.6vw,8px);font-family:inherit;flex-shrink:0;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.landscape-mode .message-box{min-height:0;padding:6px 12px}
.landscape-mode .title-bar{padding:4px 10px}
.landscape-mode .inv-slot{width:36px;height:36px}
@media (max-width: 640px) {
  .game-wrap{max-width:100%;width:100%}
  .title-bar{padding:6px 8px;gap:2px}
  .title-text{font-size:clamp(6px,1.8vw,8px)}
  .resource-bars{order:1;width:100%;margin-top:2px}
  .scene-wrapper,.scene-wrapper canvas#gc{width:100vw!important;height:auto!important;aspect-ratio:16/9}
  .message-box{min-height:100px;padding:12px 14px}
  .message-text{font-size:clamp(10px,3vw,13px);line-height:2}
  .inventory-bar{padding:10px;flex-wrap:wrap;justify-content:center}
  .inv-slots{flex-wrap:wrap;justify-content:center}
  .inv-slot{width:44px;height:44px}
  .nav-area{left:0;right:0;bottom:0;display:flex;gap:4px;padding:4px}
  .nav-btn{flex:1;min-height:48px;font-size:clamp(10px,3vw,12px)}
}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="title-bar">
    <span class="title-text">&#9760; SAINT MERCY PSYCHIATRIC HOSPITAL &#9760;</span>
    <div class="resource-bars">
      <div class="res-bar-wrap"><span class="res-label">정신</span><div class="res-bar-bg"><div class="res-bar-fill" id="san-bar" style="width:100%;background:#3366aa"></div></div><span class="res-num" id="san-num">100</span></div>
      <div class="res-bar-wrap"><span class="res-label">전지</span><div class="res-bar-bg"><div class="res-bar-fill" id="bat-bar" style="width:100%;background:#33aa44"></div></div><span class="res-num" id="bat-num">100</span></div>
    </div>
    <span class="room-num" id="room-num">ROOM 01</span>
  </div>
  <div class="scene-wrapper" id="scene-wrapper">
    <canvas id="gc" width="640" height="360"></canvas>
    <div class="crt"></div>
    <div class="vignette"></div>
    <div class="flash" id="flash"></div>
    <div class="room-label" id="room-label">병실 101호</div>
    <div class="nav-area" id="nav-area"></div>
    <div class="hover-tip" id="hover-tip"></div>
    <div class="code-modal" id="code-modal">
      <div class="code-title">[ LOCKED CABINET ]</div>
      <div class="code-led" id="code-led"></div>
      <div class="code-display" id="code-display">_ _ _ _</div>
      <div class="code-grid" id="code-grid"></div>
      <div class="code-actions">
        <button class="btn-del" id="btn-del">삭제</button>
        <button class="btn-ok" id="btn-ok">확인</button>
        <button class="btn-cancel" id="btn-cancel">취소</button>
      </div>
    </div>
    <div class="doc-modal" id="doc-modal">
      <div class="doc-title" id="doc-title"></div>
      <div class="doc-body" id="doc-body"></div>
      <button class="doc-close" id="doc-close">닫기</button>
    </div>
    <div class="dial-modal" id="dial-modal">
      <div class="dial-title">[ COMBINATION SAFE ]</div>
      <div class="dial-display" id="dial-display">00</div>
      <div class="dial-btns">
        <button class="dial-btn" id="dial-left5" style="font-size:clamp(8px,2vw,10px)">&laquo;5</button>
        <button class="dial-btn" id="dial-left">&larr;</button>
        <button class="dial-btn" id="dial-right">&rarr;</button>
        <button class="dial-btn" id="dial-right5" style="font-size:clamp(8px,2vw,10px)">5&raquo;</button>
        <button class="dial-btn" id="dial-ok">OK</button>
      </div>
      <div style="text-align:center;color:#555;font-size:7px;font-family:inherit" id="dial-step">1 / 3</div>
      <div style="margin-top:8px"><button class="doc-close" id="dial-cancel">취소</button></div>
    </div>
    <div class="tutorial" id="tutorial">
      <div class="tut-icon" id="tut-icon"></div>
      <div class="tut-text" id="tut-text"></div>
      <div class="tut-step" id="tut-step"></div>
    </div>
    <div class="act-overlay" id="act-overlay">
      <div class="act-title" id="act-title"></div>
      <div class="act-desc" id="act-desc"></div>
      <div style="color:#333;font-size:clamp(7px,1.8vw,8px);font-family:inherit;margin-top:20px">탭하여 계속</div>
    </div>
    <div class="win-screen" id="win-screen">
      <div class="win-title" id="win-title">&#9654; ESCAPE SUCCESSFUL &#9664;</div>
      <div class="win-text" id="win-text"></div>
      <div class="win-end" id="win-end">-- THE END --</div>
      <button class="doc-close" id="btn-restart" style="margin-top:20px;max-width:180px;align-self:center">다시 시작</button>
    </div>
  </div>
  <div class="message-box">
    <div class="message-text" id="msg">눈을 떴다. 어디인지 모르겠다...</div>
    <div class="msg-nav" id="msg-nav">
      <button class="msg-nav-btn" id="msg-prev">▲</button>
      <button class="msg-nav-btn" id="msg-next">▼</button>
    </div>
  </div>
  <div class="inventory-bar">
    <span class="inv-label">아이템</span>
    <div class="inv-slots" id="inv-slots"></div>
    <span class="inv-sel-name" id="inv-sel-name"></span>
    <button class="hint-btn" id="hint-btn">?</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const sceneWrapper = document.getElementById('scene-wrapper');
const VIRTUAL_W = 160, VIRTUAL_H = 90, S = 4;

// ===== WEB AUDIO: SOUND ENGINE =====
let audioCtx = null;
let bgmStarted = false;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(()=>{});
  }
}

function sfxPickup() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(520, audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.08);
  o.frequency.linearRampToValueAtTime(1100, audioCtx.currentTime + 0.15);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
  o.start(); o.stop(audioCtx.currentTime + 0.25);
}

function sfxClick() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square';
  o.frequency.value = 200;
  g.gain.setValueAtTime(0.06, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.06);
  o.start(); o.stop(audioCtx.currentTime + 0.06);
}

function sfxNumpad() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square';
  o.frequency.value = 440 + Math.random() * 200;
  g.gain.setValueAtTime(0.05, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
  o.start(); o.stop(audioCtx.currentTime + 0.05);
}

function sfxCorrect() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0.1, t + i * 0.1);
    g.gain.linearRampToValueAtTime(0, t + i * 0.1 + 0.2);
    o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.2);
  });
}

function sfxWrong() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(180, t);
  o.frequency.linearRampToValueAtTime(80, t + 0.4);
  g.gain.setValueAtTime(0.12, t);
  g.gain.linearRampToValueAtTime(0, t + 0.4);
  o.start(); o.stop(t + 0.4);
}

function sfxScare() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o1.connect(g); o2.connect(g); g.connect(audioCtx.destination);
  o1.type = 'sawtooth'; o1.frequency.value = 55;
  o2.type = 'sawtooth'; o2.frequency.value = 58;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.15, t + 0.05);
  g.gain.linearRampToValueAtTime(0.08, t + 0.3);
  g.gain.linearRampToValueAtTime(0, t + 0.8);
  o1.start(); o2.start(); o1.stop(t + 0.8); o2.stop(t + 0.8);
  const o3 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  o3.connect(g2); g2.connect(audioCtx.destination);
  o3.type = 'sine';
  o3.frequency.setValueAtTime(2000, t);
  o3.frequency.linearRampToValueAtTime(3500, t + 0.15);
  o3.frequency.linearRampToValueAtTime(1800, t + 0.5);
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.06, t + 0.03);
  g2.gain.linearRampToValueAtTime(0, t + 0.5);
  o3.start(); o3.stop(t + 0.5);
}

function sfxPower() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(60, t);
  o.frequency.linearRampToValueAtTime(120, t + 0.3);
  o.frequency.setValueAtTime(120, t + 0.3);
  g.gain.setValueAtTime(0.15, t);
  g.gain.setValueAtTime(0.12, t + 0.3);

// ===== DYNAMIC BACKGROUND MUSIC =====
let bgmNodes = [];
let bgmMaster = null;
let currentBgmAct = 0;
let ambNodes = [];
let currentAmbRoom = '';

function stopAudioNodes(arr) {
  arr.forEach(n => { try { if(n.stop) n.stop() } catch(e){} try { n.disconnect() } catch(e){} });
}
function stopBGM() {
  stopAudioNodes(bgmNodes); bgmNodes = []; bgmMaster = null;
  stopAudioNodes(ambNodes); ambNodes = []; currentAmbRoom = '';
  bgmStarted = false; currentBgmAct = 0;
}

function makeDrone(master, freq, type, detune, filterFreq, vol) {
  const o = audioCtx.createOscillator();
  const f = audioCtx.createBiquadFilter();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq; o.detune.value = detune;
  f.type = 'lowpass'; f.frequency.value = filterFreq; f.Q.value = 1;
  o.connect(f); f.connect(g); g.connect(master);
  g.gain.value = vol || 0.8;
  o.start();
  bgmNodes.push(o, f, g);
}

function startBGM(act) {
  if (!audioCtx) return;
  act = act || 1;
  if (bgmStarted && currentBgmAct === act) return;
  if (bgmStarted) stopBGM();
  currentBgmAct = act;
  bgmStarted = true;

  function doStart() {
    bgmMaster = audioCtx.createGain();
    bgmMaster.gain.value = 0.035;
    bgmMaster.connect(audioCtx.destination);
    bgmNodes.push(bgmMaster);
    buildBGMForAct(act);
  }

  if (audioCtx.state === 'running') {
    doStart();
  } else {
    // iOS Safari: wait for context to actually be running
    audioCtx.addEventListener('statechange', function onState() {
      if (audioCtx.state === 'running') {
        audioCtx.removeEventListener('statechange', onState);
        if (bgmStarted && currentBgmAct === act) doStart();
      }
    });
  }
}

function buildBGMForAct(act) {
  if (act === 1) {
    // ACT 1: Mystery/Unease — slow breathing pad, minor key
    makeDrone(bgmMaster, 55, 'sawtooth', 0, 200, 0.7);
    makeDrone(bgmMaster, 55.5, 'sawtooth', 7, 180, 0.6);
    makeDrone(bgmMaster, 82.4, 'triangle', -5, 300, 0.5);
    makeDrone(bgmMaster, 110, 'sine', 3, 250, 0.4);
    // Eerie high whisper
    makeDrone(bgmMaster, 164.8, 'sine', 12, 400, 0.25);
    makeDrone(bgmMaster, 155.6, 'sine', -8, 350, 0.25);
    // Slow breathing LFO
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 0.08;
    lfoG.gain.value = 0.012;
    lfo.connect(lfoG); lfoG.connect(bgmMaster.gain);
    lfo.start();
    bgmNodes.push(lfo, lfoG);
  } else if (act === 2) {
    // ACT 2: Underground Horror — heavier, metallic, faster tremolo
    makeDrone(bgmMaster, 41, 'sawtooth', 0, 150, 0.8);
    makeDrone(bgmMaster, 41.5, 'sawtooth', 10, 140, 0.7);
    makeDrone(bgmMaster, 61.7, 'triangle', -8, 200, 0.6);
    // Dissonant cluster
    makeDrone(bgmMaster, 92, 'sine', 15, 280, 0.35);
    makeDrone(bgmMaster, 87.3, 'sine', -12, 260, 0.35);
    makeDrone(bgmMaster, 123.5, 'sawtooth', 5, 180, 0.2);
    // Metallic ring
    makeDrone(bgmMaster, 330, 'sine', 25, 500, 0.08);
    // Faster tremolo
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 0.2;
    lfoG.gain.value = 0.018;
    lfo.connect(lfoG); lfoG.connect(bgmMaster.gain);
    lfo.start();
    bgmNodes.push(lfo, lfoG);
  } else {
    // ACT 3: Escape Tension — pulsing, urgent, heartbeat rhythm
    makeDrone(bgmMaster, 36.7, 'sawtooth', 0, 120, 0.8);
    makeDrone(bgmMaster, 37, 'sawtooth', 12, 110, 0.7);
    makeDrone(bgmMaster, 55, 'triangle', -3, 180, 0.6);
    // Rising tension
    makeDrone(bgmMaster, 73.4, 'sine', 8, 220, 0.4);
    makeDrone(bgmMaster, 98, 'sine', -6, 200, 0.3);
    // Urgent high
    makeDrone(bgmMaster, 220, 'sine', 20, 350, 0.12);
    makeDrone(bgmMaster, 233, 'sine', -15, 320, 0.1);
    // Heartbeat-speed LFO
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 0.9;
    lfoG.gain.value = 0.008;
    lfo.connect(lfoG); lfoG.connect(bgmMaster.gain);
    lfo.start();
    bgmNodes.push(lfo, lfoG);
    // Sub-bass pulse
    const pulse = audioCtx.createOscillator();
    const pulseG = audioCtx.createGain();
    const pulseLfo = audioCtx.createOscillator();
    const pulseLfoG = audioCtx.createGain();
    pulse.type = 'sine'; pulse.frequency.value = 30;
    pulseG.gain.value = 0.5;
    pulseLfo.type = 'square'; pulseLfo.frequency.value = 1.2;
    pulseLfoG.gain.value = 0.5;
    pulseLfo.connect(pulseLfoG); pulseLfoG.connect(pulseG.gain);
    pulse.connect(pulseG); pulseG.connect(bgmMaster);
    pulse.start(); pulseLfo.start();
    bgmNodes.push(pulse, pulseG, pulseLfo, pulseLfoG);
  }
}

// ===== ROOM AMBIENCE LAYERS =====
function updateRoomAmbience(room) {
  if (room === currentAmbRoom) return;
  // Stop previous ambience
  stopAudioNodes(ambNodes);
  ambNodes = [];
  currentAmbRoom = room;
  ensureAudio();
  if (!audioCtx) return;
  // Only create ambience for rooms that have it
  if (!['r4','r5','r6','r7','r9','r10','r11'].includes(room)) return;

  const ambMaster = audioCtx.createGain();
  ambMaster.gain.value = 0.025;
  ambMaster.connect(audioCtx.destination);
  ambNodes.push(ambMaster);

  if (audioCtx.state !== 'running') return;

  if (room === 'r4') {
    // Surveillance room — electronic hum + static
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = 60;
    g.gain.value = 0.3;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 120;
    o.connect(flt); flt.connect(g); g.connect(ambMaster);
    o.start(); ambNodes.push(o, g, flt);
  } else if (room === 'r5') {
    // Stairwell — wind howling
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.5 * (0.3 + 0.7 * Math.sin(i / d.length * Math.PI * 3));
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 400; flt.Q.value = 2;
    const g = audioCtx.createGain(); g.gain.value = 0.6;
    src.connect(flt); flt.connect(g); g.connect(ambMaster);
    src.start(); ambNodes.push(src, flt, g);
  } else if (room === 'r6' || room === 'r9') {
    // Underground/Sewer — dripping water + flowing
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.3 * (0.2 + 0.8 * Math.pow(Math.sin(i / d.length * Math.PI * 5), 2));
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 800;
    const g = audioCtx.createGain(); g.gain.value = 0.8;
    src.connect(flt); flt.connect(g); g.connect(ambMaster);
    src.start(); ambNodes.push(src, flt, g);
  } else if (room === 'r7') {
    // Lab — humming equipment + beeping
    const o1 = audioCtx.createOscillator();
    const g1 = audioCtx.createGain();
    o1.type = 'sine'; o1.frequency.value = 120;
    g1.gain.value = 0.4;
    o1.connect(g1); g1.connect(ambMaster);
    o1.start(); ambNodes.push(o1, g1);
    // Periodic beep
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    o2.type = 'sine'; o2.frequency.value = 1000;
    g2.gain.value = 0.15;
    lfo.type = 'square'; lfo.frequency.value = 0.5;
    lfoG.gain.value = 0.15;
    lfo.connect(lfoG); lfoG.connect(g2.gain);
    o2.connect(g2); g2.connect(ambMaster);
    o2.start(); lfo.start(); ambNodes.push(o2, g2, lfo, lfoG);
  } else if (room === 'r10') {
    // Boiler room — rumbling fire + steam hiss
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.value = 35;
    g.gain.value = 0.6;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 100;
    o.connect(flt); flt.connect(g); g.connect(ambMaster);
    o.start(); ambNodes.push(o, g, flt);
    // Steam hiss
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.15;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const flt2 = audioCtx.createBiquadFilter();
    flt2.type = 'highpass'; flt2.frequency.value = 4000;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.3;
    src.connect(flt2); flt2.connect(g2); g2.connect(ambMaster);
    src.start(); ambNodes.push(src, flt2, g2);
  } else if (room === 'r11') {
    // Exit — wind from outside + distant sirens
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.4 * (0.5 + 0.5 * Math.sin(i / d.length * Math.PI * 2));
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 300; flt.Q.value = 1;
    const g = audioCtx.createGain(); g.gain.value = 0.5;
    src.connect(flt); flt.connect(g); g.connect(ambMaster);
    src.start(); ambNodes.push(src, flt, g);
  }
  // r1, r2, r3, r8 — no special ambience (BGM only)
}

const msgHistory=[];
let msgIdx=-1;
function setMsg(t,type){
  // 'ambient' type (scare) won't overwrite 'item' or 'hint' within 3 seconds
  if(type==='ambient'&&G._lastMsgType&&(G._lastMsgType==='item'||G._lastMsgType==='hint')){
    const elapsed=G.t-(G._lastMsgTime||0);
    if(elapsed<3000)return;
  }
  const el=document.getElementById('msg');
  el.textContent=t;
  el.className='message-text'+(type==='item'?' msg-item':type==='hint'?' msg-hint':'');
  msgHistory.push({text:t,type:type||''});
  if(msgHistory.length>20)msgHistory.shift();
  msgIdx=msgHistory.length-1;
  G._lastMsgType=type||'';G._lastMsgTime=G.t;
}
document.getElementById('msg-prev').addEventListener('click',()=>{
  if(msgIdx>0){msgIdx--;const m=msgHistory[msgIdx];const el=document.getElementById('msg');el.textContent=m.text;el.className='message-text'+(m.type==='item'?' msg-item':m.type==='hint'?' msg-hint':'');}
});
document.getElementById('msg-next').addEventListener('click',()=>{
  if(msgIdx<msgHistory.length-1){msgIdx++;const m=msgHistory[msgIdx];const el=document.getElementById('msg');el.textContent=m.text;el.className='message-text'+(m.type==='item'?' msg-item':m.type==='hint'?' msg-hint':'');}
});

  color=color||'#680000';

}

function changeSanity(amt){
  G.sanity=Math.max(0,Math.min(100,G.sanity+amt));
  const bar=document.getElementById('san-bar');
  bar.style.width=G.sanity+'%';
  document.getElementById('san-num').textContent=G.sanity;
  if(G.sanity<=20) bar.style.background='#aa3333';
  else bar.style.background='#3366aa';
  if(amt<=-8) sfxHeartbeat();
  else if(amt<=-3) sfxDread();
  if(G.sanity<=0&&!G.ended) gameOverSanity();
}

function changeBattery(amt){
  G.battery=Math.max(0,Math.min(100,G.battery+amt));
  const bar=document.getElementById('bat-bar');
  bar.style.width=G.battery+'%';
  document.getElementById('bat-num').textContent=G.battery;

function updateInv(){
  const el=document.getElementById('inv-slots');
  el.innerHTML='';
  for(let i=0;i<8;i++){
    const slot=document.createElement('div');
    slot.className='inv-slot';
    if(i<G.inv.length){
      const id=G.inv[i];
      if(G.sel===id)slot.classList.add('selected');
      const c=document.createElement('canvas');
      c.width=32;c.height=32;c.style.width='28px';c.style.height='28px';
      drawItemSprite(c,id);
      slot.appendChild(c);
      const tip=document.createElement('span');
      tip.className='inv-tip';tip.textContent=ITEMS[id].name;
      slot.appendChild(tip);
      function onSlotClick(){
        if(G.sel===id){
          G.sel=null;
          if(id==='note') setMsg("[ 피 묻은 메모 ]\n'내 번호를 기억해. 4 - 7 - 2 - 9'");
          else setMsg(ITEMS[id].desc);
        } else {
          G.sel=id;
          if(id==='note') setMsg("피 묻은 메모 선택됨 - 코드: 4 - 7 - 2 - 9 - 사용할 물체를 클릭하세요.");
          else setMsg(ITEMS[id].name+' 선택됨 - 사용할 물체를 클릭하세요.');
        }
        updateInv();
      }
      slot.addEventListener('click',onSlotClick);
      slot.addEventListener('touchend',e=>{e.preventDefault();onSlotClick()});
    }
    el.appendChild(slot);
  }
  const selName=document.getElementById('inv-sel-name');
  selName.textContent=G.sel&&ITEMS[G.sel]?ITEMS[G.sel].name:'';
}

function getVirtualCoords(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{vx:(cx-r.left)/r.width*VIRTUAL_W,vy:(cy-r.top)/r.height*VIRTUAL_H};
}

function getZone(vx,vy){
  const zs=zones[G.room]||[];
  for(const z of zs){if(vx>=z.x&&vx<=z.x+z.w&&vy>=z.y&&vy<=z.y+z.h)return z}
  return null;
}

function getHint(){
  const f=G.flags, inv=G.inv;
  // Act 1
  if(G.room==='r1'){
    if(!f.bed) return '침대를 조사해보세요. 매트리스 아래에 뭔가 있을 수 있습니다.';
    if(!f.wall) return '벽의 핏자국을 조사해보세요. 뒤에 뭔가 숨겨져 있습니다.';
    return '복도로 이동하세요. → 버튼을 누르세요.';
  }
  if(G.room==='r2'){
    if(!f.lock&&inv.includes('key')) return '녹슨 열쇠를 선택한 후, 왼쪽의 사물함을 클릭하세요.';
    if(!f.lock) return '사물함을 열 열쇠가 필요합니다. 병실을 다시 확인해보세요.';
    if(!f.nurse&&inv.includes('note')) return '간호사실 캐비닛을 클릭하고 메모의 번호(4-7-2-9)를 입력하세요.';
    if(!f.nurse) return '캐비닛 비밀번호가 필요합니다. 병실의 핏자국을 확인해보세요.';
    return '의무실이나 감시실로 이동하세요.';
  }
  if(G.room==='r3'){
    if(!f.r3_desk) return '책상 서랍을 조사해보세요.';
    if(!f.r3_cabinet&&inv.includes('scalpel')) return '메스를 선택한 후, 약품 캐비닛을 클릭하세요.';
    if(!f.r3_cabinet) return '캐비닛이 잠겨있습니다. 날카로운 도구가 필요합니다.';
    return '복도로 돌아가 감시실로 이동하세요.';
  }
  if(G.room==='r4'){
    if(!f.r4_monitor) return '감시 모니터를 조사해보세요. 중요한 단서가 있을 수 있습니다.';
    if(!f.r4_safe) return '금고를 클릭하고 모니터의 포스트잇 번호(15-42-8)를 입력하세요.';
    if(!f.r4_powered&&inv.includes('fuse')) return '퓨즈를 선택한 후 전력 패널에 설치하세요.';
    if(!f.r4_powered) return '전력 패널에 퓨즈가 필요합니다. 복도의 캐비닛을 확인하세요.';
    return '계단실로 내려가세요. 지하로 향합니다.';
  }
  // Act 2
  if(G.room==='r5'){
    if(!f.r5_battery) return '선반을 조사해보세요. 유용한 물건이 있을 수 있습니다.';
    if(!f.r5_grate&&inv.includes('crowbar')) return '쇠지렛대를 선택한 후 환기구를 뜯어내세요.';
    if(!f.r5_grate) return '환기구를 열 도구가 필요합니다. 지하복도를 먼저 탐색하세요.';
    return '지하복도로 내려가세요.';
  }
  if(G.room==='r6'){
    if(!f.r6_corpse) return '어둠 속의 무언가를 조사해보세요. (주의: 충격적일 수 있습니다)';
    return '실험실이나 기록보관소로 이동하세요.';
  }
  if(G.room==='r7'){
    if(!f.r7_formula) return '약품 선반을 조사해보세요.';
    if(inv.includes('tape')) return '녹음테이프를 선택한 후 분석 장치에 넣어보세요.';
    return '지하복도로 돌아가 기록보관소로 이동하세요.';
  }
  if(G.room==='r8'){
    if(!f.r8_shelf) return '서류 캐비닛을 조사해보세요.';
    if(!f.r8_safe2&&inv.includes('chemical')&&inv.includes('formula')) return '화학약품을 선택한 후 금고에 사용하세요. (조합 공식도 필요)';
    if(!f.r8_safe2) return '금고를 열려면 화학약품과 조합 공식이 모두 필요합니다.';
    return '하수도로 내려가세요.';
  }
  // Act 3
  if(G.room==='r9'){
    if(!f.r9_gate&&!inv.includes('mask')) return '유독가스 때문에 밸브를 돌릴 수 없습니다. 가스마스크가 필요합니다. (r5 환기구)';
    if(!f.r9_gate) return '밸브를 여러 번 클릭해서 수문을 여세요. (가스마스크 필요)';
    return '보일러실로 이동하세요.';
  }
  if(G.room==='r10'){
    if(!f.badge_taken) return '선반을 조사해보세요. 중요한 물건이 있습니다.';
    if(!f.r10_steam&&inv.includes('card')) return '키카드를 선택한 후 제어 패널에 사용하세요.';
    if(!f.r10_steam) return '제어 패널에 키카드가 필요합니다.';
    return '비상출구로 이동하세요!';
  }
  if(G.room==='r11'){
    if(!f.r11_door&&inv.includes('badge')) return '원장 뱃지를 선택한 후 보안 단말기에 인증하세요.';
    if(!f.r11_door) return '보안 단말기에 원장 뱃지가 필요합니다.';
    if(f.r11_door) return '비상문을 클릭하세요! 탈출할 수 있습니다!';
  }
  return '주변을 꼼꼼히 조사해보세요.';
}

// ===== CODE PAD =====
function openCodePad(){
  G.pad=true;G.code='';G.modalOpen='code';
  document.getElementById('code-modal').classList.add('open');
  document.getElementById('code-display').textContent='_ _ _ _';
  document.getElementById('code-led').className='code-led';
}

function closeCodePad(){
  G.pad=false;G.code='';G.modalOpen=null;
  document.getElementById('code-modal').classList.remove('open');
}

function updateCodeDisplay(){
  let d='';
  for(let i=0;i<4;i++)d+=(i<G.code.length?G.code[i]:'_')+(i<3?' ':'');
  document.getElementById('code-display').textContent=d;
}

function setupNumpad(){
  const grid=document.getElementById('code-grid');
  for(let i=1;i<=9;i++){
    const b=document.createElement('button');b.className='num-btn';b.textContent=i;
    b.addEventListener('click',()=>{if(G.code.length<4){G.code+=i;updateCodeDisplay();sfxNumpad()}});
    grid.appendChild(b);
  }
  const z=document.createElement('button');z.className='num-btn zero';z.textContent='0';
  z.addEventListener('click',()=>{if(G.code.length<4){G.code+='0';updateCodeDisplay();sfxNumpad()}});
  grid.appendChild(z);
}

function setupCodePadEvents(){
  document.getElementById('btn-del').addEventListener('click',()=>{G.code=G.code.slice(0,-1);updateCodeDisplay()});
  document.getElementById('btn-ok').addEventListener('click',()=>{
    if(G.code==='4729'){
      document.getElementById('code-led').className='code-led correct';
      sfxCorrect();setTimeout(()=>{closeCodePad();addItem('fuse');G.flags.nurse=true;flash('#004400');sfxPickup();setMsg('정답! 캐비닛이 열렸다. 오래된 퓨즈가 있다. [퓨즈 획득]')},300);
    } else {
      document.getElementById('code-led').className='code-led wrong';
      sfxWrong();flash();setMsg('비밀번호가 틀렸다.');
      setTimeout(()=>{G.code='';updateCodeDisplay();document.getElementById('code-led').className='code-led'},700);
    }
  });
  document.getElementById('btn-cancel').addEventListener('click',()=>{closeCodePad();setMsg(ROOM_MSGS[G.room])});
}

// ===== NAVIGATION =====
function goRoom(id){
  const newAct=ROOM_ACTS[id];
  if(newAct!==G.act){
    G.act=newAct;
    if(!G.actsShown[newAct]){G.actsShown[newAct]=true;showActTitle(newAct)}
  }
  G.room=id;G.pad=false;G.sel=null;
  closeCodePad();closeDoc();closeDial();sfxDoor();
  updateRoomAmbience(id);
  document.getElementById('room-label').textContent=ROOM_LABELS[id];
  document.getElementById('room-num').textContent=ROOM_NUMS[id];
  setMsg(ROOM_MSGS[id]);
  updateInv();setupNav();
}

function setupNav(){
  const el=document.getElementById('nav-area');el.innerHTML='';
  const isMobile=window.innerWidth<640;
  (NAV_ROUTES[G.room]||[]).forEach(n=>{
    const b=document.createElement('button');b.className='nav-btn';b.textContent=n.label;
    if(isMobile){b.style.flex='1';b.style.minHeight='48px'}
    const locked=n.req&&!n.req();
    if(locked){
      b.classList.add('locked');
      const hintMsg=n.hint||'잠겨있다. 먼저 다른 곳에서 해결책을 찾아야 한다.';
      b.addEventListener('click',()=>{if(G.modalOpen)return;sfxWrong();flash();setMsg(hintMsg)});
      b.addEventListener('touchend',e=>{e.preventDefault();if(G.modalOpen)return;sfxWrong();flash();setMsg(hintMsg)});
    } else {
      b.addEventListener('click',()=>{if(G.modalOpen)return;goRoom(n.to)});
      b.addEventListener('touchend',e=>{e.preventDefault();if(G.modalOpen)return;goRoom(n.to)});
    }
    el.appendChild(b);
  });
  if(isMobile){el.style.right='0';el.style.left='0';el.style.bottom='0';el.style.display='flex'}
  else{el.style.right='10px';el.style.left='';el.style.bottom='10px'}
}

canvas.addEventListener('click',e=>{
  if(G.pad||G.modalOpen)return;
  const{vx,vy}=getVirtualCoords(e.clientX,e.clientY);
  const z=getZone(vx,vy);
  if(!z){if(G.sel)setMsg(ITEMS[G.sel].name+': 여기에 사용할 수 없다.');return}
  sfxClick();handleClick(z.id);
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(G.pad||G.modalOpen)return;
  const t=e.changedTouches[0];
  const{vx,vy}=getVirtualCoords(t.clientX,t.clientY);
  const z=getZone(vx,vy);
  if(z){showTouchFeedback(z);sfxClick();handleClick(z.id)}
  else{if(G.sel)setMsg(ITEMS[G.sel].name+': 여기에 사용할 수 없다.')}
},{passive:false});

canvas.addEventListener('mousemove',e=>{
  if('ontouchstart' in window)return;
  const{vx,vy}=getVirtualCoords(e.clientX,e.clientY);
  const z=getZone(vx,vy);
  const tip=document.getElementById('hover-tip');
  if(z){
    tip.textContent=z.tip;tip.style.display='block';
    const r=canvas.getBoundingClientRect();
    tip.style.left=(e.clientX-r.left+10)+'px';
    tip.style.top=(e.clientY-r.top-26)+'px';
    canvas.style.cursor='pointer';
  } else {tip.style.display='none';canvas.style.cursor='crosshair'}
});
canvas.addEventListener('mouseleave',()=>{document.getElementById('hover-tip').style.display='none'});

// ===== RESIZE =====
function resizeGame(){
  const cw=Math.min(window.innerWidth,640);
  const sc=cw/640;const dh=Math.round(360*sc);
  sceneWrapper.style.width=cw+'px';sceneWrapper.style.height=dh+'px';
  canvas.style.width=cw+'px';canvas.style.height=dh+'px';
  G.displayScale=sc;
  setupNav();
}

function handleOrientation(){
  const isL=window.innerWidth>window.innerHeight;
  const w=document.querySelector('.game-wrap');
  if(isL&&window.innerWidth<768)w.classList.add('landscape-mode');
  else w.classList.remove('landscape-mode');
  resizeGame();
}

window.addEventListener('resize',resizeGame);
window.addEventListener('orientationchange',()=>setTimeout(handleOrientation,150));

function updateFlicker(){
  if(Math.random()<0.004){
    flickerVal=0.05+Math.random()*0.35;
    setTimeout(()=>flickerVal=0.7+Math.random()*0.28,70+Math.random()*110);
    setTimeout(()=>flickerVal=0.1+Math.random()*0.25,190+Math.random()*80);
    setTimeout(()=>flickerVal=1.0,330+Math.random()*120);
  }
}

// ===== TOUCH FEEDBACK =====
function drawTouchFeedback(){
  if(G.touchFeedback&&G.t<G.touchFeedback.until){
    const z=G.touchFeedback.zone;
    ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#ffffff';
    ctx.fillRect(z.x*S,z.y*S,z.w*S,z.h*S);ctx.restore();
  }
}

// ===== ZONE HINTS (subtle corner dots for interactive areas) =====
const isTouchDevice='ontouchstart' in window;
function drawZoneHints(){
  const zs=zones[G.room]||[];
  const alpha=isTouchDevice?0.18:0.10;
  const pulse=0.5+Math.sin(G.t*0.003)*0.5; // 0~1 pulse
  ctx.save();ctx.globalAlpha=alpha*0.5+alpha*0.5*pulse;ctx.fillStyle='#ffffff';
  for(const z of zs){
    // 4 corner dots
    ctx.fillRect(z.x*S,z.y*S,S,S);
    ctx.fillRect((z.x+z.w-1)*S,z.y*S,S,S);
    ctx.fillRect(z.x*S,(z.y+z.h-1)*S,S,S);
    ctx.fillRect((z.x+z.w-1)*S,(z.y+z.h-1)*S,S,S);
  }
  ctx.restore();
}

// ===== IDLE HINT PULSE =====
let lastAction=0;
function resetIdle(){lastAction=G.t;document.getElementById('hint-btn').classList.remove('pulse')}
canvas.addEventListener('click',resetIdle);
canvas.addEventListener('touchstart',resetIdle);

// ===== MAIN LOOP =====
let lastT=0;
let batteryTimer=0;
function loop(timestamp){
  if(G.ended)return;
  const dt=timestamp-lastT;lastT=timestamp;G.t+=dt;
  updateFlicker();

  // Pulse hint button after 30s idle
  if(G.t-lastAction>30000) document.getElementById('hint-btn').classList.add('pulse');

  // Battery drain in dark rooms
  if(DARK_ROOMS.includes(G.room)){
    batteryTimer+=dt;
    if(batteryTimer>=2000){
      batteryTimer-=2000;
      changeBattery(-3);
    }
  }

  ctx.clearRect(0,0,640,360);

  if(G.room==='r1')drawRoom1(flickerVal);
  else if(G.room==='r2')drawRoom2(flickerVal,G.t);
  else if(G.room==='r3')drawRoom3(flickerVal,G.t);
  else if(G.room==='r4')drawRoom4(flickerVal,G.t);
  else if(G.room==='r5')drawRoom5(flickerVal,G.t);
  else if(G.room==='r6')drawRoom6(flickerVal,G.t);
  else if(G.room==='r7')drawRoom7(flickerVal,G.t);
  else if(G.room==='r8')drawRoom8(flickerVal,G.t);
  else if(G.room==='r9')drawRoom9(flickerVal,G.t);
  else if(G.room==='r10')drawRoom10(flickerVal,G.t);
  else if(G.room==='r11')drawRoom11(flickerVal,G.t);

  drawZoneHints();
  requestAnimationFrame(loop);
}

// ===== TUTORIAL =====
const TUT_STEPS=[
  {icon:'👆',text:'화면의 물체를 클릭/탭해서\n조사하세요',step:'1 / 3'},
  {icon:'🎒',text:'아이템을 탭해 선택한 후\n물체에 사용하세요',step:'2 / 3'},
  {icon:'🚪',text:'하단의 이동 버튼으로\n다른 방으로 이동하세요',step:'3 / 3'}
];
let tutStep=0;
function showTutorial(){
  if(localStorage.getItem('smp_tut_done'))return startGame();
  tutStep=0;
  renderTutStep();
  document.getElementById('tutorial').classList.add('open');
  const el=document.getElementById('tutorial');
  function advance(e){
    e.preventDefault();
    ensureAudio();
    tutStep++;
    if(tutStep>=TUT_STEPS.length){
      el.classList.remove('open');
      el.removeEventListener('click',advance);
      el.removeEventListener('touchend',advance);
      localStorage.setItem('smp_tut_done','1');
      startGame();
    } else renderTutStep();
  }
  el.addEventListener('click',advance);
  el.addEventListener('touchend',advance);
}
function renderTutStep(){
  const s=TUT_STEPS[tutStep];
  document.getElementById('tut-icon').textContent=s.icon;
  document.getElementById('tut-text').textContent=s.text;
  document.getElementById('tut-step').textContent=s.step+' — 탭하여 계속';
}

// ===== INIT =====
function startGame(){
  // Do NOT call ensureAudio/startBGM here — startGame may be called
  // during page load (tutorial skip) without user gesture.
  // Audio init happens in initAudioOnInteraction (capture phase listener).
  setupAmbientScare();
  setupDripLoop();
  goRoom('r1');
  showActTitle(1);
  requestAnimationFrame(loop);
}
function init(){
  setupNumpad();
  setupCodePadEvents();
  resizeGame();
  showTutorial();
}
init();
